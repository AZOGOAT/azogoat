name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"      # daily (UTC)
  workflow_dispatch:           # run manually from the Actions tab

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6  # v3.34
        with:
          # Personal access token required. Fine-grained (recommended): repo
          # AZOGOAT/AZOGOAT, Contents=Read/Write, Metadata=Read. Or classic: repo.
          # Add it under Settings > Secrets and variables > Actions as METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          user: AZOGOAT

          # --- base + theme (matched to the ocean palette) ---
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Zurich
          config_octicon: yes

          # isocalendar: 3D-ish contribution calendar for the full year
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # languages distribution
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
