name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"      # daily (UTC)
  workflow_dispatch:           # run manually from the Actions tab

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6  # v3.34
        with:
          # CLASSIC personal access token required (fine-grained tokens are NOT
          # supported - metrics uses the GraphQL API). Scope: public_repo (or
          # full 'repo' to include private-repo stats). It commits assets/metrics.svg.
          # Add it under Settings > Secrets and variables > Actions as METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          filename: assets/metrics.svg
          user: AZOGOAT

          # base "" disables all default sections (header/activity/community/
          # repositories/metadata) - only the plugins below render. Trim.
          base: ""
          config_timezone: Europe/Zurich

          # isocalendar: 3D-ish contribution calendar for the full year
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # languages distribution. Private repos are included ONLY when the
          # METRICS_TOKEN is a classic token with full 'repo' scope (not public_repo).
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
